services:
  semantic-search:
    build:
      context: .
      dockerfile: Dockerfile

    image: semantic-search:latest
    container_name: semantic-search

    ports:
      - "8000:8000"

    volumes:
      - ./app/embeddings:/app/app/embeddings
      - ./app/models:/app/app/models
      - ./data:/app/app/data
      - ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface

    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/root/.cache/huggingface

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s